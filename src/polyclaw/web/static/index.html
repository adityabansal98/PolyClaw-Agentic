<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  .header { padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: #58a6ff; }

  .layout { display: flex; height: calc(100vh - 57px); }
  .main { flex: 1; overflow-y: auto; padding: 20px; }
  .sidebar { width: 360px; border-left: 1px solid #30363d; overflow-y: auto; padding: 16px; }

  /* Search */
  .search-box { position: relative; margin-bottom: 20px; }
  .search-box input { width: 100%; padding: 10px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 15px; outline: none; }
  .search-box input:focus { border-color: #58a6ff; }
  .search-box input::placeholder { color: #8b949e; }
  .search-hint { color: #8b949e; font-size: 12px; margin-top: 6px; }

  /* Market cards */
  .markets { display: flex; flex-direction: column; gap: 8px; }
  .market-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
  .market-card:hover { border-color: #58a6ff; }
  .market-card.selected { border-color: #58a6ff; background: #1c2333; }
  .market-question { font-size: 14px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
  .market-prices { display: flex; gap: 8px; margin-bottom: 8px; }
  .price-pill { padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
  .price-yes { background: #1a3a2a; color: #3fb950; }
  .price-no { background: #3a1a1a; color: #f85149; }
  .market-meta { display: flex; gap: 16px; font-size: 12px; color: #8b949e; }

  /* Trade panel */
  .panel-title { font-size: 14px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .trade-form { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .trade-market { font-size: 13px; margin-bottom: 12px; color: #c9d1d9; line-height: 1.4; }

  .side-toggle { display: flex; gap: 0; margin-bottom: 12px; }
  .side-btn { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #30363d; background: #0d1117; color: #8b949e; transition: all 0.15s; }
  .side-btn:first-child { border-radius: 6px 0 0 6px; }
  .side-btn:last-child { border-radius: 0 6px 6px 0; }
  .side-btn.active-buy { background: #1a3a2a; color: #3fb950; border-color: #3fb950; }
  .side-btn.active-sell { background: #3a1a1a; color: #f85149; border-color: #f85149; }

  .outcome-toggle { display: flex; gap: 0; margin-bottom: 12px; }
  .outcome-btn { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #30363d; background: #0d1117; color: #8b949e; transition: all 0.15s; }
  .outcome-btn:first-child { border-radius: 6px 0 0 6px; }
  .outcome-btn:last-child { border-radius: 0 6px 6px 0; }
  .outcome-btn.active { background: #1c2333; color: #58a6ff; border-color: #58a6ff; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 8px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none; }
  .form-group input:focus { border-color: #58a6ff; }

  .trade-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .trade-btn.buy { background: #238636; color: #fff; }
  .trade-btn.buy:hover { background: #2ea043; }
  .trade-btn.sell { background: #da3633; color: #fff; }
  .trade-btn.sell:hover { background: #f85149; }
  .trade-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .trade-result { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 13px; }
  .trade-result.success { background: #1a3a2a; color: #3fb950; }
  .trade-result.error { background: #3a1a1a; color: #f85149; }

  /* Orderbook */
  .orderbook { margin-bottom: 16px; }
  .ob-row { display: flex; font-size: 12px; padding: 2px 0; font-family: monospace; }
  .ob-price { width: 70px; text-align: right; }
  .ob-size { width: 100px; text-align: right; color: #8b949e; }
  .ob-bar { flex: 1; margin-left: 8px; position: relative; height: 18px; }
  .ob-bar-fill { position: absolute; top: 0; right: 0; height: 100%; border-radius: 2px; opacity: 0.2; }
  .ob-ask .ob-price { color: #f85149; }
  .ob-bid .ob-price { color: #3fb950; }
  .ob-spread { text-align: center; color: #8b949e; font-size: 11px; padding: 4px 0; border-top: 1px solid #30363d; border-bottom: 1px solid #30363d; margin: 4px 0; }

  /* Portfolio */
  .portfolio { margin-top: 16px; }
  .port-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .port-stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; }
  .port-stat-label { font-size: 11px; color: #8b949e; }
  .port-stat-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .port-stat-value.positive { color: #3fb950; }
  .port-stat-value.negative { color: #f85149; }

  .position-row { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; margin-bottom: 6px; font-size: 13px; }
  .position-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .position-question { color: #c9d1d9; font-size: 12px; }
  .position-details { display: flex; gap: 12px; font-size: 12px; color: #8b949e; margin-top: 4px; }

  .reset-btn { width: 100%; padding: 8px; background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; cursor: pointer; margin-top: 8px; }
  .reset-btn:hover { border-color: #f85149; color: #f85149; }

  .empty { color: #8b949e; font-size: 13px; text-align: center; padding: 40px 20px; }
  .loading { color: #8b949e; font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Poly</span>Claw</h1>
</div>

<div class="layout">
  <div class="main">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search markets... (e.g. NBA, Trump, Bitcoin)" autofocus>
      <div class="search-hint">Type to search live Polymarket bets</div>
    </div>
    <div id="markets" class="markets">
      <div class="empty">Search for markets to get started</div>
    </div>
  </div>

  <div class="sidebar">
    <!-- Trade form -->
    <div id="trade-section" style="display:none;">
      <div class="panel-title">Trade</div>
      <div class="trade-form">
        <div class="trade-market" id="trade-question"></div>

        <div class="outcome-toggle" id="outcome-toggle"></div>

        <div class="side-toggle">
          <div class="side-btn active-buy" id="btn-buy" onclick="setSide('BUY')">BUY</div>
          <div class="side-btn" id="btn-sell" onclick="setSide('SELL')">SELL</div>
        </div>

        <div class="form-group">
          <label id="size-label">Amount (USDC)</label>
          <input type="number" id="trade-size" placeholder="100" step="1" min="1">
        </div>

        <button class="trade-btn buy" id="trade-btn" onclick="placeTrade()">BUY</button>
        <div id="trade-result"></div>
      </div>

      <!-- Orderbook -->
      <div class="panel-title">Order Book</div>
      <div id="orderbook" class="orderbook">
        <div class="loading">Select a market</div>
      </div>
    </div>

    <!-- Portfolio -->
    <div class="portfolio">
      <div class="panel-title">Paper Portfolio</div>
      <div class="port-stats" id="port-stats"></div>
      <div id="positions"></div>
      <button class="reset-btn" onclick="resetPortfolio()">Reset Paper Trading</button>
    </div>
  </div>
</div>

<script>
  let selectedMarket = null;
  let selectedOutcomeIdx = 0;
  let currentSide = 'BUY';
  let searchTimeout = null;

  // Debounced search
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchMarkets(e.target.value), 300);
  });

  async function searchMarkets(query) {
    if (!query.trim()) {
      document.getElementById('markets').innerHTML = '<div class="empty">Search for markets to get started</div>';
      return;
    }
    document.getElementById('markets').innerHTML = '<div class="loading">Searching...</div>';

    try {
      const res = await fetch(`/api/markets?q=${encodeURIComponent(query)}&limit=30`);
      const markets = await res.json();

      if (!markets.length) {
        document.getElementById('markets').innerHTML = '<div class="empty">No markets found</div>';
        return;
      }

      document.getElementById('markets').innerHTML = markets.map(m => {
        const yesPrice = m.outcome_prices[0] || '?';
        const noPrice = m.outcome_prices[1] || '?';
        const vol = formatNum(m.volume);
        const liq = formatNum(m.liquidity);
        return `
          <div class="market-card" onclick='selectMarket(${JSON.stringify(m).replace(/'/g, "&#39;")})' id="card-${m.id}">
            <div class="market-question">${esc(m.question)}</div>
            <div class="market-prices">
              <span class="price-pill price-yes">Yes ${(parseFloat(yesPrice)*100).toFixed(1)}%</span>
              <span class="price-pill price-no">No ${(parseFloat(noPrice)*100).toFixed(1)}%</span>
            </div>
            <div class="market-meta">
              <span>Vol: $${vol}</span>
              <span>Liq: $${liq}</span>
              ${m.group_item_title ? `<span>${esc(m.group_item_title)}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      document.getElementById('markets').innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  function selectMarket(market) {
    selectedMarket = market;
    selectedOutcomeIdx = 0;
    currentSide = 'BUY';

    // Highlight card
    document.querySelectorAll('.market-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(`card-${market.id}`).classList.add('selected');

    // Show trade section
    document.getElementById('trade-section').style.display = 'block';
    document.getElementById('trade-question').textContent = market.question;

    // Outcome toggle
    const toggle = document.getElementById('outcome-toggle');
    toggle.innerHTML = market.outcomes.map((o, i) => {
      const price = (parseFloat(market.outcome_prices[i]) * 100).toFixed(1);
      return `<div class="outcome-btn ${i === 0 ? 'active' : ''}" onclick="setOutcome(${i})">${o} (${price}%)</div>`;
    }).join('');

    setSide('BUY');
    loadOrderbook();
  }

  function setOutcome(idx) {
    selectedOutcomeIdx = idx;
    document.querySelectorAll('.outcome-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
    loadOrderbook();
  }

  function setSide(side) {
    currentSide = side;
    const buyBtn = document.getElementById('btn-buy');
    const sellBtn = document.getElementById('btn-sell');
    const tradeBtn = document.getElementById('trade-btn');
    const sizeLabel = document.getElementById('size-label');

    buyBtn.className = 'side-btn' + (side === 'BUY' ? ' active-buy' : '');
    sellBtn.className = 'side-btn' + (side === 'SELL' ? ' active-sell' : '');
    tradeBtn.className = 'trade-btn ' + (side === 'BUY' ? 'buy' : 'sell');
    tradeBtn.textContent = side === 'BUY' ? 'BUY' : 'SELL';
    sizeLabel.textContent = side === 'BUY' ? 'Amount (USDC)' : 'Shares to sell';
  }

  async function loadOrderbook() {
    if (!selectedMarket) return;
    const tokenId = selectedMarket.clob_token_ids[selectedOutcomeIdx];
    if (!tokenId) return;

    document.getElementById('orderbook').innerHTML = '<div class="loading">Loading...</div>';

    try {
      const res = await fetch(`/api/orderbook/${tokenId}`);
      const ob = await res.json();
      if (ob.error) {
        document.getElementById('orderbook').innerHTML = `<div class="empty">${ob.error}</div>`;
        return;
      }
      renderOrderbook(ob);
    } catch (err) {
      document.getElementById('orderbook').innerHTML = `<div class="empty">Error loading orderbook</div>`;
    }
  }

  function renderOrderbook(ob) {
    const maxSize = Math.max(
      ...ob.asks.map(a => a.size),
      ...ob.bids.map(b => b.size),
      1
    );

    // Asks (reversed so highest at top)
    const asks = ob.asks.slice().sort((a, b) => b.price - a.price).slice(0, 8);
    const bids = ob.bids.slice().sort((a, b) => b.price - a.price).slice(0, 8);

    let html = '';
    asks.forEach(a => {
      const pct = (a.size / maxSize * 100).toFixed(0);
      html += `<div class="ob-row ob-ask">
        <span class="ob-price">${a.price.toFixed(4)}</span>
        <span class="ob-size">${formatNum(a.size)}</span>
        <span class="ob-bar"><span class="ob-bar-fill" style="width:${pct}%;background:#f85149;"></span></span>
      </div>`;
    });

    const spread = ob.spread ? ob.spread.toFixed(4) : '—';
    const mid = ob.midpoint ? ob.midpoint.toFixed(4) : '—';
    html += `<div class="ob-spread">Spread: ${spread} | Mid: ${mid}</div>`;

    bids.forEach(b => {
      const pct = (b.size / maxSize * 100).toFixed(0);
      html += `<div class="ob-row ob-bid">
        <span class="ob-price">${b.price.toFixed(4)}</span>
        <span class="ob-size">${formatNum(b.size)}</span>
        <span class="ob-bar"><span class="ob-bar-fill" style="width:${pct}%;background:#3fb950;"></span></span>
      </div>`;
    });

    document.getElementById('orderbook').innerHTML = html;
  }

  async function placeTrade() {
    if (!selectedMarket) return;
    const size = parseFloat(document.getElementById('trade-size').value);
    if (!size || size <= 0) {
      showTradeResult('Enter a valid amount', false);
      return;
    }

    const tokenId = selectedMarket.clob_token_ids[selectedOutcomeIdx];
    const outcome = selectedMarket.outcomes[selectedOutcomeIdx];

    document.getElementById('trade-btn').disabled = true;

    try {
      const res = await fetch('/api/trade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token_id: tokenId,
          market_id: selectedMarket.condition_id,
          question: selectedMarket.question,
          outcome: outcome,
          side: currentSide,
          size: size,
        }),
      });
      const result = await res.json();

      if (result.status === 'FILLED') {
        const shares = result.filled_size.toLocaleString(undefined, {maximumFractionDigits: 2});
        const price = result.filled_price.toFixed(4);
        const cost = result.total_cost.toFixed(2);
        showTradeResult(`${currentSide} ${shares} ${outcome} shares @ $${price} ($${cost})`, true);
      } else if (result.status === 'PENDING') {
        showTradeResult(`Limit order pending`, true);
      } else {
        showTradeResult(result.message || `Order ${result.status}`, false);
      }

      loadPortfolio();
    } catch (err) {
      showTradeResult(`Error: ${err.message}`, false);
    } finally {
      document.getElementById('trade-btn').disabled = false;
    }
  }

  function showTradeResult(msg, success) {
    const el = document.getElementById('trade-result');
    el.className = 'trade-result ' + (success ? 'success' : 'error');
    el.textContent = msg;
    setTimeout(() => { el.textContent = ''; el.className = ''; }, 5000);
  }

  async function loadPortfolio() {
    try {
      const res = await fetch('/api/portfolio');
      const p = await res.json();

      const pnlClass = (v) => v > 0 ? 'positive' : v < 0 ? 'negative' : '';
      document.getElementById('port-stats').innerHTML = `
        <div class="port-stat">
          <div class="port-stat-label">Cash</div>
          <div class="port-stat-value">$${p.cash_balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
        </div>
        <div class="port-stat">
          <div class="port-stat-label">Equity</div>
          <div class="port-stat-value">$${p.total_equity.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
        </div>
        <div class="port-stat">
          <div class="port-stat-label">Realized PnL</div>
          <div class="port-stat-value ${pnlClass(p.total_realized_pnl)}">$${p.total_realized_pnl.toFixed(2)}</div>
        </div>
        <div class="port-stat">
          <div class="port-stat-label">Unrealized PnL</div>
          <div class="port-stat-value ${pnlClass(p.total_unrealized_pnl)}">$${p.total_unrealized_pnl.toFixed(2)}</div>
        </div>`;

      if (p.positions.length) {
        document.getElementById('positions').innerHTML = p.positions.map(pos => {
          const pnl = pos.unrealized_pnl != null ? pos.unrealized_pnl.toFixed(2) : '—';
          const curr = pos.current_price != null ? pos.current_price.toFixed(4) : '—';
          return `<div class="position-row">
            <div class="position-header">
              <span><strong>${esc(pos.outcome)}</strong> — ${pos.shares.toLocaleString(undefined, {maximumFractionDigits: 0})} shares</span>
              <span class="${pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : ''}" style="color:${pnl > 0 ? '#3fb950' : pnl < 0 ? '#f85149' : '#8b949e'}">$${pnl}</span>
            </div>
            <div class="position-question">${esc(pos.market_question)}</div>
            <div class="position-details">
              <span>Entry: $${pos.avg_entry_price.toFixed(4)}</span>
              <span>Current: $${curr}</span>
            </div>
          </div>`;
        }).join('');
      } else {
        document.getElementById('positions').innerHTML = '<div class="empty" style="padding:16px">No positions</div>';
      }
    } catch (err) {
      console.error('Portfolio error:', err);
    }
  }

  async function resetPortfolio() {
    if (!confirm('Reset paper trading? All positions and history will be cleared.')) return;
    await fetch('/api/reset', { method: 'POST' });
    loadPortfolio();
  }

  // Helpers
  function formatNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toFixed(0);
  }
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Load portfolio on startup
  loadPortfolio();
</script>
</body>
</html>

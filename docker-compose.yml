# Phase 3c local dev stack.
#
# Usage:
#   make dev                   # alias for docker compose up
#   docker compose up          # Postgres + API + worker
#   docker compose up postgres # just the DB
#
# A new contributor goes from `git clone` → `docker compose up` → first trade
# visible on the local leaderboard in under 10 minutes (PLAN §7.3 item 18).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polyclaw
      POSTGRES_PASSWORD: polyclaw_dev
      POSTGRES_DB: polyclaw
    ports:
      - "5432:5432"
    volumes:
      - polyclaw_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyclaw -d polyclaw"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "-m", "flask", "--app", "polyclaw.web.app:app", "run", "--host", "0.0.0.0", "--port", "5000"]
    environment:
      POLYCLAW_DATABASE_URL: postgresql+psycopg://polyclaw:polyclaw_dev@postgres:5432/polyclaw
      POLYCLAW_DB_BACKEND: supabase
      FLASK_DEBUG: "1"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      POLYCLAW_DATABASE_URL: postgresql+psycopg://polyclaw:polyclaw_dev@postgres:5432/polyclaw
      POLYCLAW_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  polyclaw_pg:
